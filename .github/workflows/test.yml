name: Tests

on:
  push:
    branches: [main, dev, test-runner]
  pull_request:
    branches: [main, dev, test-runner]

jobs:
  jest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [main, dev, test-runner]
      fail-fast: false
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm test -- --ci --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-${{ matrix.branch }}
          path: server/coverage/

  selenium:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [main, dev, test-runner]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache client yarn deps
        uses: actions/cache@v4
        with:
          path: client/.yarn/cache
          key: yarn-client-${{ matrix.branch }}-${{ hashFiles('client/yarn.lock') }}
          restore-keys: yarn-client-${{ matrix.branch }}-

      - name: Install server deps
        run: npm install --prefix server

      - name: Install client deps
        run: yarn install --frozen-lockfile
        working-directory: client

      - name: Install test deps
        run: npm install --prefix test

      - uses: browser-actions/setup-chrome@v1

      - name: Build client
        run: yarn build
        working-directory: client

      - name: Start server
        run: npm start --prefix server &
        env:
          PORT: 3000
          NODE_ENV: test

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Selenium tests
        run: npm test --prefix test
        env:
          BASE_URL: http://localhost:3000
          HEADLESS: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: selenium-screenshots-${{ matrix.branch }}
          path: test/screenshots/

  all-tests-pass:
    runs-on: ubuntu-latest
    needs: [jest, selenium]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.jest.result }}" != "success" ] || \
             [ "${{ needs.selenium.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi